name: Build Blog Indexes

on:
  push:
    paths:
      - "posts/*.md"
      - "scripts/build-blog.js"
      - ".github/workflows/build-blog.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install gray-matter fs-extra

      - name: Generate blog JSON
        run: node scripts/build-blog.js

      - name: Commit & Push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-update blog indexes" || echo "No changes to commit"
          git push
