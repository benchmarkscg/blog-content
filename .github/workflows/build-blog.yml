name: Build Blog Indexes

on:
  push:
    paths:
      - "posts/*.md"
      - "scripts/build-blog.js"
      - "manifest.json"
      - ".github/workflows/build-blog.yml"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install gray-matter fs-extra

      - name: Build blog indexes
        run: node scripts/build-blog.js

      - name: Commit generated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add index/
          git add tags/
          git add search/
          git add manifest.json

          git commit -m "Auto update blog indexes" || echo "No changes"

          git push
